<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Flask Site - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <nav class="navbar navbar-expand bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Magic Buttons</a>
            <div class="navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/place">Cards</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/game">Games</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chat">Live Chat</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row align-items-center mb-5 bg-white p-4 rounded-3 shadow-sm">
            <div class="col-md-6 text-center text-md-start mb-4 mb-md-0">
                <h1>Hello from Flask!</h1>
                <p class="lead text-muted">Welcome to the most magical place on the web.</p>
                <div class="d-flex flex-wrap gap-2 justify-content-center justify-content-md-start mt-4">
                    <button id="clickMe" class="btn btn-warning">Click me</button>
                    <a class="btn btn-danger" href="https://e3.365dm.com/21/06/1600x900/skynews-monkey-statue-hartlepool_5408900.jpg?20210608110020" target="_blank">Do Not Click</a>
                    <a id="t2" class="btn btn-outline-primary" href="/about">Say Hey</a>
                </div>
            </div>
            <div class="col-md-6 text-center">
                <img src="https://img.freepik.com/premium-photo/king-monkey-sitting-golden-throne-wearing-white-coat-hd-wallpaper_594776-3196.jpg?w=2000" alt="Monkey King" class="img-fluid rounded shadow" style="max-height: 300px;">
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
                    <h3 class="mb-3 text-center">Send a Message</h3>
                    <form action="/submit" method="post" class="m-0 shadow-none p-0 bg-transparent">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="fname" class="form-label fw-bold">First Name</label>
                                <input type="text" class="form-control" id="fname" name="fname" value="Monkey">
                            </div>
                            <div class="col-md-6">
                                <label for="lname" class="form-label fw-bold">Last Name</label>
                                <input type="text" class="form-control" id="lname" name="lname" value="King">
                            </div>
                            <div class="col-12">
                                <label for="msg" class="form-label fw-bold">Message</label>
                                <textarea class="form-control" id="msg" name="msg" rows="3">...</textarea>
                            </div>
                            <div class="col-12 text-center mt-4">
                                <input type="submit" class="btn btn-primary px-5" value="Submit">
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="static/scriptplace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
