<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Flask Site - Timer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <nav class="navbar navbar-expand bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Magic Buttons</a>
            <div class="navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/place">Cards</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/game">Games</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chat">Live Chat</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 d-flex justify-content-center">
        <div class="card p-5 shadow-sm text-center" style="max-width: 500px; width: 100%;">
            <h2 class="mb-4">Periodics Timer</h2>
            
            <div class="d-flex justify-content-center align-items-center gap-3 bg-light p-4 rounded-3 border">
                <button class="btn btn-success btn-lg" id="timerStart">Start</button>
                
                <span id="timerDisplay" class="display-4 fw-bold text-primary px-3">00:00</span>
                
                <button id="timerStop" class="btn btn-danger btn-lg">Stop</button>
            </div>
            <p class="text-muted mt-4 mb-0">Use this to track your productivity (or how long you stare at the monkey).</p>
        </div>
    </div>

    <script src="static/scriptplace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
