<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Flask Site - Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="static/style.css">
</head>

<body data-page-name="place"> 
    <nav class="navbar navbar-expand bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Magic Buttons</a>
            <div class="navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/place">Cards</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/game">Games</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chat">Live Chat</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        
        <div class="card p-4 shadow-sm border-0 mb-5 text-center">
            <h2>My Card Collection</h2>
            <p id="somePTag" class="text-muted">Generate fun cards below!</p>
            
            <div class="d-flex justify-content-center gap-2 mb-4 flex-wrap">
                <input type="text" class="form-control w-auto" id="textInput" placeholder="Please enter text...">
                <button id="addCard" class="btn btn-success">Add Card</button>
                <button class="btn btn-primary" id="firstButton">Lmao</button>
                <button class="btn btn-warning" id="3">+1</button>
            </div>
            
            <div id="cardContainer" class="row g-4 text-start"></div>
        </div>

        <div class="row g-4">
            <div class="col-md-7">
                <div class="card p-4 shadow-sm h-100">
                    <h3 class="text-start">Chad Reviews</h3>
                    <div class="table-responsive">
                        <table class="table table-hover mt-3">
                            <thead class="table-light">
                                <tr>
                                    <th>Name</th>
                                    <th>Comments</th>
                                </tr>
                            </thead>
                            <tbody id="comment-container">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card p-4 shadow-sm h-100">
                    <h3 class="text-start">Leave a Review</h3>
                    <form id="com" class="m-0 p-0 shadow-none bg-transparent">
                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label fw-bold">Name</label>
                            <input name="name" type="text" class="form-control" id="exampleInputEmail1" placeholder="Your name...">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label fw-bold">Comment</label>
                            <textarea name="message" class="form-control" id="exampleInputPassword1" rows="4" placeholder="Be brutally honest..."></textarea> 
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Submit Review</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='comment.js') }}"></script>
    <script src="static/scriptplace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
